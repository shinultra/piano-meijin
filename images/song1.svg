<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#070b2e"/>
      <stop offset="50%" stop-color="#152150"/>
      <stop offset="100%" stop-color="#2d3a8a"/>
    </linearGradient>
    <radialGradient id="moonHalo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff6c8" stop-opacity="0.55"/>
      <stop offset="40%" stop-color="#fff6c8" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#fff6c8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="starHalo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="35%" stop-color="#a8c7ff" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#a8c7ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff6c8" stop-opacity="1"/>
      <stop offset="80%" stop-color="#ffe9a8" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#f7d77a" stop-opacity="0.85"/>
    </radialGradient>
    <path id="sparkle" d="M0 -32 L8 -8 L32 0 L8 8 L0 32 L-8 8 L-32 0 L-8 -8 Z" fill="#ffffff"/>
    <path id="sparkleSm" d="M0 -16 L4 -4 L16 0 L4 4 L0 16 L-4 4 L-16 0 L-4 -4 Z" fill="#ffffff"/>
  </defs>

  <rect width="1200" height="800" fill="url(#sky)"/>

  <!-- Moon halo + moon -->
  <circle cx="960" cy="210" r="260" fill="url(#moonHalo)"/>
  <circle cx="960" cy="210" r="82" fill="url(#moonGlow)"/>

  <!-- Tiny scattered stars -->
  <g fill="#e8eeff">
    <circle cx="50" cy="60" r="1.6"/>
    <circle cx="120" cy="130" r="1.2"/>
    <circle cx="195" cy="70" r="2"/>
    <circle cx="280" cy="150" r="1.4"/>
    <circle cx="360" cy="90" r="1"/>
    <circle cx="430" cy="170" r="1.8"/>
    <circle cx="520" cy="100" r="1.3"/>
    <circle cx="600" cy="200" r="1.5"/>
    <circle cx="690" cy="110" r="2"/>
    <circle cx="760" cy="60" r="1.2"/>
    <circle cx="830" cy="140" r="1.5"/>
    <circle cx="1080" cy="80" r="1.2"/>
    <circle cx="1140" cy="150" r="1.8"/>
    <circle cx="75" cy="280" r="1.5"/>
    <circle cx="160" cy="330" r="1.2"/>
    <circle cx="250" cy="250" r="2"/>
    <circle cx="360" cy="310" r="1.4"/>
    <circle cx="460" cy="380" r="1"/>
    <circle cx="540" cy="280" r="1.7"/>
    <circle cx="650" cy="350" r="1.4"/>
    <circle cx="770" cy="290" r="1.2"/>
    <circle cx="870" cy="360" r="1.5"/>
    <circle cx="1100" cy="370" r="1.8"/>
    <circle cx="1180" cy="300" r="1.2"/>
    <circle cx="60" cy="450" r="1.5"/>
    <circle cx="170" cy="500" r="1.2"/>
    <circle cx="280" cy="460" r="1.8"/>
    <circle cx="400" cy="520" r="1"/>
    <circle cx="520" cy="450" r="1.5"/>
    <circle cx="640" cy="520" r="1.2"/>
    <circle cx="760" cy="470" r="1.8"/>
    <circle cx="880" cy="540" r="1.3"/>
    <circle cx="1000" cy="470" r="1.5"/>
    <circle cx="1120" cy="510" r="1.1"/>
  </g>

  <!-- Medium sparkle stars (small twinkles) -->
  <g>
    <use href="#sparkleSm" x="120" y="350"/>
    <use href="#sparkleSm" x="540" y="500"/>
    <use href="#sparkleSm" x="280" y="200"/>
    <use href="#sparkleSm" x="880" y="450"/>
    <use href="#sparkleSm" x="700" y="240"/>
  </g>

  <!-- Large sparkle stars with halos -->
  <g>
    <circle cx="210" cy="180" r="65" fill="url(#starHalo)"/>
    <use href="#sparkle" transform="translate(210 180) scale(1.25)"/>

    <circle cx="470" cy="290" r="58" fill="url(#starHalo)"/>
    <use href="#sparkle" transform="translate(470 290) scale(1.05)"/>

    <circle cx="650" cy="140" r="48" fill="url(#starHalo)"/>
    <use href="#sparkle" transform="translate(650 140) scale(0.75)"/>

    <circle cx="360" cy="440" r="58" fill="url(#starHalo)"/>
    <use href="#sparkle" transform="translate(360 440) scale(1)"/>

    <circle cx="790" cy="400" r="52" fill="url(#starHalo)"/>
    <use href="#sparkle" transform="translate(790 400) scale(0.9)"/>

    <circle cx="1080" cy="430" r="52" fill="url(#starHalo)"/>
    <use href="#sparkle" transform="translate(1080 430) scale(0.95)"/>
  </g>

  <!-- Soft distant hills -->
  <path d="M0 680 Q300 620 600 660 Q900 700 1200 640 L1200 800 L0 800 Z" fill="#0a1648" opacity="0.55"/>
  <path d="M0 750 Q400 720 800 740 Q1000 752 1200 720 L1200 800 L0 800 Z" fill="#06112e" opacity="0.85"/>
</svg>
