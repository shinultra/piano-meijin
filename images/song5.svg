<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#b4d8e3"/>
      <stop offset="100%" stop-color="#dde8c5"/>
    </linearGradient>
    <linearGradient id="pond" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5fa57b"/>
      <stop offset="50%" stop-color="#3e7d62"/>
      <stop offset="100%" stop-color="#1d4a3a"/>
    </linearGradient>
    <linearGradient id="frogBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7cc070"/>
      <stop offset="100%" stop-color="#4a8a3f"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="1200" height="800" fill="url(#sky5)"/>

  <!-- Sun -->
  <circle cx="950" cy="180" r="65" fill="#fff7c0" opacity="0.85"/>
  <circle cx="950" cy="180" r="35" fill="#fff9d6"/>

  <!-- Distant trees -->
  <g fill="#3a6e44" opacity="0.6">
    <ellipse cx="80" cy="380" rx="50" ry="80"/>
    <rect x="76" y="380" width="8" height="60" fill="#4a3024"/>
    <ellipse cx="240" cy="370" rx="60" ry="90"/>
    <rect x="236" y="370" width="8" height="70" fill="#4a3024"/>
    <ellipse cx="1000" cy="380" rx="55" ry="85"/>
    <rect x="996" y="380" width="8" height="65" fill="#4a3024"/>
    <ellipse cx="1140" cy="385" rx="50" ry="80"/>
    <rect x="1136" y="385" width="8" height="60" fill="#4a3024"/>
  </g>

  <!-- Hills -->
  <path d="M0 480 Q300 430 600 460 Q900 490 1200 450 L1200 540 L0 540 Z" fill="#6a9e5a" opacity="0.7"/>

  <!-- Pond bank -->
  <rect x="0" y="510" width="1200" height="60" fill="#a8855a"/>
  <path d="M0 510 Q300 500 600 514 Q900 524 1200 506 L1200 540 L0 540 Z" fill="#8a6a48"/>

  <!-- Pond water -->
  <rect x="0" y="540" width="1200" height="260" fill="url(#pond)"/>

  <!-- Water ripples -->
  <g stroke="#9ad8b3" stroke-width="1.4" fill="none" opacity="0.5">
    <path d="M0 570 Q300 568 600 572 T1200 569"/>
    <path d="M0 620 Q300 624 600 618 T1200 622"/>
    <path d="M0 680 Q300 676 600 682 T1200 678"/>
    <path d="M0 740 Q300 744 600 738 T1200 742"/>
  </g>

  <!-- Reflection of sun on water -->
  <g fill="#fff5b0" opacity="0.45">
    <ellipse cx="950" cy="580" rx="42" ry="3"/>
    <ellipse cx="950" cy="600" rx="32" ry="2"/>
    <ellipse cx="950" cy="620" rx="22" ry="2"/>
  </g>

  <!-- Lily pads -->
  <g>
    <!-- Lily pad 1 (with flower) -->
    <g transform="translate(280 660)">
      <path d="M -50 0 A 52 22 0 1 0 50 0 L 8 0 L 2 -12 L -2 -12 L -8 0 Z" fill="#4a9c5e"/>
      <ellipse cx="0" cy="-3" rx="48" ry="14" fill="#3d8a4f" opacity="0.4"/>
      <!-- Pink lily flower -->
      <g transform="translate(0 -10)">
        <ellipse cx="-12" cy="-3" rx="9" ry="14" fill="#ffd1e6" transform="rotate(-30)"/>
        <ellipse cx="12" cy="-3" rx="9" ry="14" fill="#ffd1e6" transform="rotate(30)"/>
        <ellipse cx="0" cy="-10" rx="9" ry="14" fill="#ffb5d4"/>
        <ellipse cx="0" cy="-5" rx="6" ry="9" fill="#ff8eb1"/>
        <circle cx="0" cy="-5" r="3" fill="#ffe066"/>
      </g>
    </g>

    <!-- Lily pad 2 -->
    <g transform="translate(720 720)">
      <path d="M -60 0 A 64 26 0 1 0 60 0 L 10 0 L 3 -14 L -3 -14 L -10 0 Z" fill="#4a9c5e"/>
      <ellipse cx="0" cy="-4" rx="58" ry="17" fill="#3d8a4f" opacity="0.4"/>
    </g>

    <!-- Lily pad 3 -->
    <g transform="translate(960 670)">
      <path d="M -40 0 A 42 18 0 1 0 40 0 L 7 0 L 2 -10 L -2 -10 L -7 0 Z" fill="#4a9c5e"/>
      <ellipse cx="0" cy="-3" rx="38" ry="12" fill="#3d8a4f" opacity="0.4"/>
    </g>
  </g>

  <!-- Reeds/cattails -->
  <g>
    <g transform="translate(120 540)">
      <rect x="-2" y="0" width="3" height="-140" fill="#5a8a3a"/>
      <rect x="-2" y="-180" width="3" height="40" fill="#5a8a3a"/>
      <ellipse cx="0" cy="-160" rx="6" ry="18" fill="#5a3a1a"/>
    </g>
    <g transform="translate(145 540)">
      <rect x="-2" y="0" width="3" height="-120" fill="#5a8a3a"/>
      <ellipse cx="0" cy="-140" rx="5" ry="16" fill="#5a3a1a"/>
    </g>
    <g transform="translate(1080 540)">
      <rect x="-2" y="0" width="3" height="-160" fill="#5a8a3a"/>
      <ellipse cx="0" cy="-180" rx="6" ry="20" fill="#5a3a1a"/>
    </g>
    <g transform="translate(1110 540)">
      <rect x="-2" y="0" width="3" height="-130" fill="#5a8a3a"/>
      <ellipse cx="0" cy="-150" rx="5" ry="16" fill="#5a3a1a"/>
    </g>
  </g>

  <!-- Cute frog on lily pad (center) -->
  <g transform="translate(540 530)">
    <!-- Big lily pad under frog -->
    <path d="M -110 50 A 115 30 0 1 0 110 50 L 14 50 L 4 32 L -4 32 L -14 50 Z" fill="#4a9c5e"/>
    <ellipse cx="0" cy="46" rx="100" ry="20" fill="#3d8a4f" opacity="0.4"/>

    <!-- Frog shadow -->
    <ellipse cx="0" cy="48" rx="78" ry="8" fill="#1a3a25" opacity="0.4"/>

    <!-- Frog body -->
    <ellipse cx="0" cy="0" rx="78" ry="48" fill="url(#frogBody)"/>
    <!-- Belly highlight -->
    <ellipse cx="0" cy="18" rx="46" ry="20" fill="#dff0c4"/>
    <!-- Back spots -->
    <ellipse cx="-30" cy="-14" rx="9" ry="6" fill="#3d6a30" opacity="0.6"/>
    <ellipse cx="32" cy="-12" rx="10" ry="7" fill="#3d6a30" opacity="0.6"/>
    <ellipse cx="0" cy="-22" rx="7" ry="5" fill="#3d6a30" opacity="0.6"/>

    <!-- Front legs -->
    <ellipse cx="-58" cy="30" rx="20" ry="12" fill="#5fa854"/>
    <g fill="#5fa854"><circle cx="-72" cy="34" r="6"/><circle cx="-66" cy="38" r="6"/><circle cx="-60" cy="38" r="6"/></g>
    <ellipse cx="58" cy="30" rx="20" ry="12" fill="#5fa854"/>
    <g fill="#5fa854"><circle cx="72" cy="34" r="6"/><circle cx="66" cy="38" r="6"/><circle cx="60" cy="38" r="6"/></g>

    <!-- Eyes (bulging) -->
    <circle cx="-30" cy="-40" r="22" fill="#7cc070"/>
    <circle cx="30" cy="-40" r="22" fill="#7cc070"/>
    <circle cx="-30" cy="-42" r="18" fill="#ffffff"/>
    <circle cx="30" cy="-42" r="18" fill="#ffffff"/>
    <circle cx="-30" cy="-42" r="11" fill="#1a1a1a"/>
    <circle cx="30" cy="-42" r="11" fill="#1a1a1a"/>
    <circle cx="-26" cy="-46" r="4" fill="#ffffff"/>
    <circle cx="34" cy="-46" r="4" fill="#ffffff"/>

    <!-- Mouth (smile) -->
    <path d="M-22 8 Q0 26 22 8" stroke="#2a4818" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Cheeks -->
    <circle cx="-44" cy="4" r="6" fill="#ff9eb1" opacity="0.5"/>
    <circle cx="44" cy="4" r="6" fill="#ff9eb1" opacity="0.5"/>
  </g>
</svg>
