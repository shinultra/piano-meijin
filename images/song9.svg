<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky9" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a1840"/>
      <stop offset="40%" stop-color="#85304a"/>
      <stop offset="70%" stop-color="#e88a4a"/>
      <stop offset="100%" stop-color="#ffd58a"/>
    </linearGradient>
    <radialGradient id="moon9" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff5b0" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#fff5b0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ground9" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a1828"/>
      <stop offset="100%" stop-color="#0a0610"/>
    </linearGradient>
    <linearGradient id="sword" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#c8d4e6"/>
      <stop offset="100%" stop-color="#7a8a9e"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="800" fill="url(#sky9)"/>

  <!-- Twin moons -->
  <circle cx="980" cy="180" r="180" fill="url(#moon9)"/>
  <circle cx="980" cy="180" r="62" fill="#fff5b0"/>
  <circle cx="200" cy="220" r="100" fill="url(#moon9)"/>
  <circle cx="200" cy="220" r="32" fill="#ffe0a8" opacity="0.95"/>

  <!-- Distant stars -->
  <g fill="#fff5b0" opacity="0.9">
    <circle cx="80" cy="60" r="1.6"/>
    <circle cx="180" cy="110" r="1.2"/>
    <circle cx="320" cy="80" r="1.8"/>
    <circle cx="450" cy="140" r="1.2"/>
    <circle cx="540" cy="80" r="1.6"/>
    <circle cx="660" cy="130" r="1.4"/>
    <circle cx="760" cy="60" r="1.8"/>
    <circle cx="860" cy="120" r="1.2"/>
    <circle cx="1080" cy="60" r="1.5"/>
    <circle cx="1150" cy="150" r="1.4"/>
    <circle cx="60" cy="320" r="1.4"/>
    <circle cx="340" cy="340" r="1.2"/>
    <circle cx="600" cy="280" r="1.6"/>
    <circle cx="820" cy="340" r="1.2"/>
    <circle cx="1180" cy="320" r="1.5"/>
  </g>

  <!-- Cloud streaks lit by sunset -->
  <g fill="#ffb87a" opacity="0.55">
    <ellipse cx="380" cy="210" rx="140" ry="9"/>
    <ellipse cx="700" cy="180" rx="100" ry="7"/>
    <ellipse cx="1020" cy="260" rx="90" ry="7"/>
  </g>

  <!-- Far mountain range -->
  <path d="M0 510 L130 380 L260 460 L390 360 L520 440 L650 360 L780 450 L910 370 L1050 440 L1200 400 L1200 580 L0 580 Z" fill="#3a2840" opacity="0.65"/>

  <!-- Middle mountains -->
  <path d="M0 560 L100 460 L240 540 L380 450 L500 520 L620 440 L760 530 L900 460 L1040 510 L1200 470 L1200 620 L0 620 Z" fill="#231a30" opacity="0.85"/>

  <!-- Dragon silhouette flying near the moon -->
  <g transform="translate(900 240)" fill="#1a0c20">
    <!-- Body -->
    <path d="M-90 0 Q-50 -8 0 -2 Q 50 4 110 -4 L 120 6 Q 50 18 -10 14 Q -60 12 -100 18 Z"/>
    <!-- Head -->
    <path d="M105 -4 L 140 -14 L 150 -8 L 138 4 L 110 4 Z"/>
    <!-- Eye -->
    <circle cx="135" cy="-6" r="2" fill="#ffd166"/>
    <!-- Front wing (upper) -->
    <path d="M-30 -2 Q -50 -60 -10 -90 Q 20 -70 40 -30 L 30 -10 Q 0 -10 -30 -2 Z"/>
    <!-- Back wing -->
    <path d="M-90 4 Q -130 -40 -120 -86 Q -90 -70 -60 -32 L -50 -8 Q -70 -4 -90 4 Z"/>
    <!-- Tail -->
    <path d="M-90 10 Q -130 24 -160 18 L -158 24 Q -130 36 -90 22 Z"/>
    <!-- Tail spike -->
    <polygon points="-160,18 -178,12 -174,22 -158,24"/>
    <!-- Spines along back -->
    <polygon points="-40,-6 -34,-16 -28,-6"/>
    <polygon points="-10,-8 -4,-18 2,-8"/>
    <polygon points="20,-10 26,-20 32,-10"/>
    <polygon points="50,-6 56,-16 62,-6"/>
  </g>

  <!-- Castle on near mountain -->
  <g transform="translate(620 520)" fill="#0a0610">
    <!-- Wall base -->
    <rect x="-90" y="-40" width="180" height="50"/>
    <!-- Battlements -->
    <g>
      <rect x="-90" y="-50" width="14" height="10"/>
      <rect x="-66" y="-50" width="14" height="10"/>
      <rect x="-42" y="-50" width="14" height="10"/>
      <rect x="-18" y="-50" width="14" height="10"/>
      <rect x="6" y="-50" width="14" height="10"/>
      <rect x="30" y="-50" width="14" height="10"/>
      <rect x="54" y="-50" width="14" height="10"/>
      <rect x="76" y="-50" width="14" height="10"/>
    </g>
    <!-- Left tower -->
    <rect x="-92" y="-100" width="32" height="60"/>
    <rect x="-94" y="-110" width="36" height="10"/>
    <polygon points="-94,-110 -76,-138 -58,-110"/>
    <!-- Center tower (taller) -->
    <rect x="-12" y="-130" width="24" height="90"/>
    <rect x="-14" y="-140" width="28" height="10"/>
    <polygon points="-14,-140 0,-176 14,-140"/>
    <!-- Right tower -->
    <rect x="60" y="-100" width="32" height="60"/>
    <rect x="58" y="-110" width="36" height="10"/>
    <polygon points="58,-110 76,-138 94,-110"/>
    <!-- Flags -->
    <line x1="0" y1="-176" x2="0" y2="-200" stroke="#0a0610" stroke-width="2"/>
    <polygon points="0,-200 16,-194 0,-188" fill="#c83040"/>
    <line x1="-76" y1="-138" x2="-76" y2="-156" stroke="#0a0610" stroke-width="2"/>
    <polygon points="-76,-156 -64,-152 -76,-148" fill="#c83040"/>
    <line x1="76" y1="-138" x2="76" y2="-156" stroke="#0a0610" stroke-width="2"/>
    <polygon points="76,-156 88,-152 76,-148" fill="#c83040"/>
    <!-- Windows (lit) -->
    <rect x="-80" y="-78" width="6" height="10" fill="#ffd166"/>
    <rect x="-68" y="-78" width="6" height="10" fill="#ffd166"/>
    <rect x="-4" y="-100" width="8" height="14" fill="#ffd166"/>
    <rect x="-4" y="-78" width="8" height="14" fill="#ffd166"/>
    <rect x="72" y="-78" width="6" height="10" fill="#ffd166"/>
    <rect x="84" y="-78" width="6" height="10" fill="#ffd166"/>
    <!-- Gate -->
    <path d="M-14 10 L-14 -20 Q 0 -32 14 -20 L 14 10 Z" fill="#3a1a14"/>
  </g>

  <!-- Foreground ground -->
  <rect x="0" y="620" width="1200" height="180" fill="url(#ground9)"/>

  <!-- Foreground rocks -->
  <g fill="#0a0610">
    <path d="M-20 800 L 80 720 L 180 760 L 220 800 Z"/>
    <path d="M820 800 L 940 720 L 1080 770 L 1180 800 Z"/>
  </g>

  <!-- Sword stuck in stone (hero's icon, generic fantasy trope) -->
  <g transform="translate(360 680)">
    <!-- Stone -->
    <ellipse cx="0" cy="40" rx="60" ry="14" fill="#3a2820"/>
    <path d="M-58 40 Q -50 -10 0 -20 Q 50 -10 58 40 Z" fill="#5a4838"/>
    <!-- Shadow on stone -->
    <ellipse cx="0" cy="-10" rx="30" ry="6" fill="#2a1818" opacity="0.65"/>
    <!-- Sword blade -->
    <rect x="-5" y="-120" width="10" height="100" fill="url(#sword)"/>
    <polygon points="-5,-118 0,-130 5,-118" fill="#c8d4e6"/>
    <!-- Cross-guard -->
    <rect x="-22" y="-22" width="44" height="6" rx="2" fill="#c89a35"/>
    <!-- Handle -->
    <rect x="-4" y="-16" width="8" height="20" fill="#3a1a14"/>
    <!-- Pommel -->
    <circle cx="0" cy="6" r="6" fill="#c89a35"/>
    <!-- Glow around sword -->
    <ellipse cx="0" cy="-60" rx="36" ry="80" fill="#ffd166" opacity="0.18"/>
  </g>

  <!-- Hero silhouette (heading towards castle) -->
  <g transform="translate(540 700)" fill="#0a0610">
    <!-- Cape -->
    <path d="M-12 -34 Q -22 -16 -20 18 L -12 16 L -8 -32 Z"/>
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="9" ry="22"/>
    <!-- Head -->
    <circle cx="0" cy="-30" r="9"/>
    <!-- Legs -->
    <rect x="-7" y="20" width="6" height="22"/>
    <rect x="1" y="20" width="6" height="22"/>
    <!-- Arm with sword -->
    <line x1="6" y1="-8" x2="14" y2="-16" stroke="#0a0610" stroke-width="4" stroke-linecap="round"/>
    <line x1="14" y1="-16" x2="22" y2="-36" stroke="#c8d4e6" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
